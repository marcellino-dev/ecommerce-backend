# =========================================
# Servidor
# =========================================
server.port=${PORT:8080}

# =========================================
# Banco de Dados - PostgreSQL (Supabase)
# =========================================
spring.datasource.url=jdbc:postgresql://db.yqjzabpxhgkmfgfbjyby.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Evita timeout de conex„o com Supabase
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000

# =========================================
# JPA / Hibernate
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================================
# JWT
# =========================================
jwt.secret=${JWT_SECRET:minha-chave-super-secreta-troque-em-producao-com-256bits}
jwt.expiration=86400000

# =========================================
# Admin
# =========================================
admin.email=${ADMIN_EMAIL:marcelinosouza.dev@gmail.com}

# =========================================
# CORS
# =========================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# =========================================
# Logs
# =========================================
logging.level.com.ecommerce=INFO
logging.level.org.springframework.security=INFO
# =========================================
# Configurações do Servidor
# =========================================
server.port=8080

# =========================================
# Banco de Dados — H2 (Desenvolvimento)
# =========================================
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----------------------------------------
# PostgreSQL (Produção) — descomente e ajuste
# ----------------------------------------
# spring.datasource.url=jdbc:postgresql://localhost:5432/ecommercedb
# spring.datasource.username=seu_usuario
# spring.datasource.password=sua_senha
# spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------------------
# MySQL (Produção) — descomente e ajuste
# ----------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/ecommercedb?useSSL=false&serverTimezone=UTC
# spring.datasource.username=seu_usuario
# spring.datasource.password=sua_senha
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / Hibernate
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Para PostgreSQL: org.hibernate.dialect.PostgreSQLDialect
# Para MySQL:      org.hibernate.dialect.MySQLDialect

# =========================================
# JWT
# =========================================
jwt.secret=minha-chave-super-secreta-troque-em-producao-com-256bits
jwt.expiration=86400000

# =========================================
# Logs
# =========================================
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=DEBUG
